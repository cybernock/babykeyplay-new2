<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover"/>
  <meta name="theme-color" content="#0a0e27"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>BabyKeyPlay 🌟</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{overflow:hidden;width:100%;height:100%;background:#0a0e27;touch-action:none;user-select:none;-webkit-user-select:none}
    #root{width:100%;height:100%}
    canvas{display:block;position:fixed;top:0;left:0;touch-action:none;pointer-events:none}
    @keyframes camera-shake{0%{transform:translate(0,0) rotate(0deg)}25%{transform:translate(6px,6px) rotate(1.5deg)}50%{transform:translate(-6px,-6px) rotate(-1.5deg)}75%{transform:translate(6px,-6px) rotate(1deg)}100%{transform:translate(0,0) rotate(0deg)}}
    @keyframes screen-flash{0%{background:rgba(255,255,255,0.9)}100%{background:transparent}}
    @keyframes bkp-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.8;transform:scale(1.05)}}
    @keyframes float-up{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-130px) scale(1.5);opacity:0}}
    @keyframes letter-pop{0%{transform:translate(-50%,-50%) scale(0) rotate(-15deg);opacity:0}30%{transform:translate(-50%,-50%) scale(1.3) rotate(5deg);opacity:1}70%{transform:translate(-50%,-50%) scale(1) rotate(-2deg);opacity:1}100%{transform:translate(-50%,-50%) scale(1.5) rotate(0deg);opacity:0}}
    @keyframes combo-burst{0%{transform:translate(-50%,-50%) scale(0);opacity:0}20%{transform:translate(-50%,-50%) scale(1.5);opacity:1}80%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(1.2);opacity:0}}
    @keyframes wiggle{0%,100%{transform:rotate(-5deg) scale(1)}50%{transform:rotate(5deg) scale(1.05)}}
    @keyframes balloon-float{0%{transform:translateY(0) rotate(-5deg);opacity:1}100%{transform:translateY(-110vh) rotate(5deg);opacity:0.3}}
    @keyframes target-pulse{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.15)}}
    @keyframes gift-bounce{0%,100%{transform:translate(-50%,-50%) scale(1) rotate(-3deg)}50%{transform:translate(-50%,-50%) scale(1.1) rotate(3deg)}}
    @keyframes word-pop{0%{transform:translate(-50%,-50%) scale(0) rotate(-20deg);opacity:0}25%{transform:translate(-50%,-50%) scale(1.4) rotate(8deg);opacity:1}75%{transform:translate(-50%,-50%) scale(1.1) rotate(-3deg);opacity:1}100%{transform:translate(-50%,-50%) scale(1.6) rotate(0);opacity:0}}
    @keyframes badge-in{0%{transform:translateX(120%) scale(0.5);opacity:0}50%{transform:translateX(-10%) scale(1.05);opacity:1}75%{transform:translateX(5%) scale(0.98)}100%{transform:translateX(0%) scale(1);opacity:1}}
    @keyframes badge-out{0%{transform:translateX(0);opacity:1}100%{transform:translateX(120%);opacity:0}}
    @keyframes fly-across{0%{transform:translateX(-200px) scaleX(1)}49%{transform:translateX(calc(100vw + 200px)) scaleX(1)}50%{transform:translateX(calc(100vw + 200px)) scaleX(-1)}100%{transform:translateX(-200px) scaleX(-1)}}
    @keyframes warp-spin{0%{transform:translate(-50%,-50%) scale(0) rotate(0deg);opacity:1}100%{transform:translate(-50%,-50%) scale(3) rotate(720deg);opacity:0}}
    @keyframes piano-press{0%,100%{transform:scaleY(1)}50%{transform:scaleY(0.92);filter:brightness(1.4)}}
    @keyframes splash-in{0%{transform:scale(0);opacity:0.9}100%{transform:scale(4);opacity:0}}
    @keyframes snow-fall{0%{transform:translateY(-20px) rotate(0deg);opacity:0.9}100%{transform:translateY(110vh) rotate(360deg);opacity:0.2}}
    @keyframes confetti-fall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
    @keyframes shake-hint{0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}
    @media(prefers-reduced-motion:no-preference){.camera-shake{animation:camera-shake 0.25s ease-in-out}.screen-flash{animation:screen-flash 0.35s ease-out}}
    .animate-bkp-pulse{animation:bkp-pulse 2s ease-in-out infinite}
    .float-score{animation:float-up 1.2s ease-out forwards;pointer-events:none;position:fixed;z-index:80;font-size:2rem;font-weight:900;text-shadow:0 2px 8px rgba(0,0,0,0.5);white-space:nowrap}
    .key-letter{animation:letter-pop 0.9s cubic-bezier(0.34,1.56,0.64,1) forwards;position:fixed;z-index:70;pointer-events:none;font-weight:900;line-height:1;text-shadow:0 0 60px currentColor,0 4px 20px rgba(0,0,0,0.4)}
    .combo-display{animation:combo-burst 1.4s ease-out forwards;position:fixed;z-index:75;pointer-events:none;font-weight:900;text-shadow:0 0 40px currentColor,0 0 80px currentColor;white-space:nowrap}
    .target-ring{animation:target-pulse 1s ease-in-out infinite;position:fixed;pointer-events:all;border-radius:50%;border:4px solid currentColor;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .balloon{animation:balloon-float linear forwards;position:fixed;pointer-events:none;z-index:25;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.3))}
    .animal-friend{position:fixed;pointer-events:all;cursor:pointer;animation:wiggle 2s ease-in-out infinite;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.5));z-index:20}
    .gift-box{animation:gift-bounce 1.2s ease-in-out infinite;position:fixed;pointer-events:all;cursor:pointer;z-index:28;filter:drop-shadow(0 0 20px gold)}
    .reaction-word{animation:word-pop 0.95s cubic-bezier(0.34,1.56,0.64,1) forwards;position:fixed;z-index:72;pointer-events:none;font-weight:900;text-shadow:0 0 30px currentColor,-2px -2px 0 rgba(0,0,0,0.5),2px 2px 0 rgba(0,0,0,0.5)}
    .badge-enter{animation:badge-in 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards}
    .badge-exit{animation:badge-out 0.5s ease-in forwards}
    .creature-fly{animation:fly-across linear forwards;position:fixed;z-index:22;pointer-events:none;font-size:3.5rem;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4))}
    .warp-ring{animation:warp-spin 1s ease-out forwards;position:fixed;z-index:76;pointer-events:none;border-radius:50%;border:6px solid currentColor}
    .piano-key-press{animation:piano-press 0.15s ease-out}
    .splash-circle{animation:splash-in 0.7s ease-out forwards;position:fixed;pointer-events:none;z-index:11;border-radius:50%}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#3f3f46;border-radius:2px}
  </style>
</head>

    // ════════════════════════════════════════════════════════════════════════════
    // THEMES
    // ════════════════════════════════════════════════════════════════════════════
    const THEMES={
      SPACE:{id:'space',name:'🚀 Space',bg:'#0a0e27',particleColors:['#ff006e','#00f5ff','#39ff14','#b537f2','#ff6b35','#ffff00'],particleShapes:['circle','star'],weather:'lightning'},
      OCEAN:{id:'ocean',name:'🌊 Ocean',bg:'#001e36',particleColors:['#00a8ff','#0097e6','#4bcffa','#48dbfb','#ffffff'],particleShapes:['circle','bubble'],weather:'bubbles'},
      JUNGLE:{id:'jungle',name:'🌿 Jungle',bg:'#0b2b0b',particleColors:['#4cd137','#44bd32','#e1b12c','#fbc531','#8c7ae6'],particleShapes:['circle','leaf'],weather:'petals'},
      CANDY:{id:'candy',name:'🍭 Candy',bg:'#3a0020',particleColors:['#ff4d4d','#ff9ff3','#feca57','#ff6b9d','#c44dff'],particleShapes:['circle','square','candy'],weather:'candy'},
      NEON:{id:'neon',name:'⚡ Neon Cyber',bg:'#000000',particleColors:['#ff00ff','#00ffff','#00ff00','#ffff00','#ff0000'],particleShapes:['square','circle'],weather:'lightning'},
      DISCO:{id:'disco',name:'🪩 Disco Party',bg:'#0d0010',particleColors:['#ff00ff','#00ffff','#ff9900','#ff0066','#00ff66','#ffff00'],particleShapes:['circle','star','square'],weather:'confetti'},
      WINTER:{id:'winter',name:'❄️ Winter',bg:'#0a1628',particleColors:['#a8d8ff','#c9e8ff','#ffffff','#b0e0e6','#87ceeb'],particleShapes:['circle','star'],weather:'snow'},
    };
    const getTC=id=>THEMES[(id||'space').toUpperCase()]||THEMES.SPACE;

    const MODES={
      FREE_PLAY:{id:'free_play',name:'🎮 Free Play',description:'Tap and type for colorful explosions!'},
      LEARNING:{id:'learning',name:'📚 Learning',description:'Press keys to see big letters!'},
      ANIMAL:{id:'animal',name:'🐾 Animal Friends',description:'Cute animals bounce all around!'},

    // ════════════════════════════════════════════════════════════════════════════
    // CONTEXT
    // ════════════════════════════════════════════════════════════════════════════
    const PPC=createContext(null);
    function ParentPanelProvider({children}){
      const ls=(k,d)=>{try{const v=localStorage.getItem(k);return v===null?d:v}catch{return d}};
      const li=(k,d)=>{try{return parseInt(localStorage.getItem(k)||d,10)}catch{return d}};
      const lb=(k,d)=>{try{const v=localStorage.getItem(k);return v===null?d:v==='true'}catch{return d}};
      const[isPanelOpen,setIPO]=useState(false);
      const[isLocked,setIL]=useState(false);
      const[theme,setTheme]=useState(()=>ls('bkp_t','space'));
      const[mode,setMode]=useState(()=>ls('bkp_m','free_play'));
      const[soundEnabled,setSound]=useState(()=>ls('bkp_s','true')!=='false');
      const[brightness,setBrightness]=useState(()=>li('bkp_b',100));

      const[sessionTime,setSessionTime]=useState(0);
      const[timeRemaining,setTR]=useState(0);

      },[theme,mode,soundEnabled,brightness,reduceMotion,particleDensity,musicEnabled,multiplayer,surpriseEffects,voiceReactions,fpsCap,audioVisualizer,starsEnabled,motionEffectsEnabled,rainbowTrail,fireworksEnabled,comboEnabled,targetGame,balloons,ripple,giftBoxes,weatherFX,flyingCreatures,achievements,reactionWords,pianoKeys,lightningEnabled,warpMode,confettiCannon]);

    const useParentPanel=()=>useContext(PPC);

    // ════════════════════════════════════════════════════════════════════════════
    // AUDIO MANAGER
    // ════════════════════════════════════════════════════════════════════════════
    const NOTES={a:261.63,s:293.66,d:329.63,f:349.23,g:392,h:440,j:493.88,k:523.25};

    ];

    function useAudioManager(){
      const cRef=useRef(null),aRef=useRef(null),om=useRef(new Map());
      const init=useCallback(()=>{if(!cRef.current){try{const AC=window.AudioContext||window.webkitAudioContext;cRef.current=new AC();aRef.current=cRef.current.createAnalyser();aRef.current.fftSize=256;aRef.current.connect(cRef.current.destination);}catch{}}if(cRef.current?.state==='suspended')cRef.current.resume();return{ctx:cRef.current,an:aRef.current};},[]);
      const _p=(freq,dur,type='sine',xp=0.5,vol=0.3)=>{const{ctx,an}=init();if(!ctx)return;const o=ctx.createOscillator(),g=ctx.createGain(),pan=ctx.createStereoPanner?.();o.type=type;o.frequency.value=freq;o.connect(g);if(pan){pan.pan.value=xp*2-1;g.connect(pan);pan.connect(an);}else g.connect(an);g.gain.setValueAtTime(vol,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);o.start();o.stop(ctx.currentTime+dur);};
      const playNote=useCallback((key,sustain=false,xp=0.5)=>{const{ctx,an}=init();if(!ctx)return;const freq=typeof key==='number'?key:(NOTES[key?.toLowerCase()]||NF[Math.floor(Math.random()*NF.length)]);if(sustain&&om.current.has(key))return;const o=ctx.createOscillator(),g=ctx.createGain(),pan=ctx.createStereoPanner?.();o.type='sine';o.frequency.value=freq;o.connect(g);if(pan){pan.pan.value=xp*2-1;g.connect(pan);pan.connect(an);}else g.connect(an);o.start();if(sustain){g.gain.setValueAtTime(0.3,ctx.currentTime);om.current.set(key,{o,g});}else{g.gain.setValueAtTime(0.3,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);o.stop(ctx.currentTime+0.5);}},[init]);
      const playPianoKey=useCallback((freq,xp=0.5)=>{const{ctx,an}=init();if(!ctx)return;const o=ctx.createOscillator(),g=ctx.createGain(),pan=ctx.createStereoPanner?.();o.type='triangle';o.frequency.value=freq;o.connect(g);if(pan){pan.pan.value=xp*2-1;g.connect(pan);pan.connect(an);}else g.connect(an);g.gain.setValueAtTime(0.5,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1.2);o.start();o.stop(ctx.currentTime+1.2);},[init]);
      const playPop=useCallback((xp=0.5)=>_p(600,0.12,'sine',xp,0.3),[init]);
      const playFirework=useCallback(()=>{[0,60,110].forEach(d=>{setTimeout(()=>_p(200+Math.random()*700,0.5,'triangle',Math.random(),0.12),d);});},[init]);
      const playTarget=useCallback(()=>{_p(880,0.18,'sine',0.5,0.4);setTimeout(()=>_p(1320,0.14,'sine',0.5,0.3),80);},[init]);
      const playGift=useCallback(()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>_p(f,0.3,'sine',0.5,0.25),i*80));},[init]);
      const playDrum=useCallback((type)=>{const{ctx}=init();if(!ctx)return;if(type==='kick'){const o=ctx.createOscillator(),g=ctx.createGain();o.frequency.setValueAtTime(150,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.5);g.gain.setValueAtTime(1,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.5);o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+0.5);}else if(type==='snare'){const buf=ctx.createBuffer(1,ctx.sampleRate*0.1,ctx.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);const src=ctx.createBufferSource(),g=ctx.createGain();src.buffer=buf;g.gain.setValueAtTime(0.5,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.1);src.connect(g);g.connect(ctx.destination);src.start();}else{const buf=ctx.createBuffer(1,ctx.sampleRate*0.05,ctx.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*0.5;const src=ctx.createBufferSource(),g=ctx.createGain(),flt=ctx.createBiquadFilter();flt.type='highpass';flt.frequency.value=8000;src.buffer=buf;src.connect(flt);flt.connect(g);g.gain.setValueAtTime(0.3,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.05);g.connect(ctx.destination);src.start();}},[init]);
      const playWarp=useCallback(()=>{const{ctx}=init();if(!ctx)return;const freqs=[261,311,392,523,659,784,1047];freqs.forEach((f,i)=>setTimeout(()=>_p(f,0.4,'sawtooth',0.5,0.1),i*60));},[init]);
      const speak=useCallback((text)=>{if('speechSynthesis'in window){const u=new SpeechSynthesisUtterance(text);u.pitch=1.8;u.rate=1.3;u.volume=1;window.speechSynthesis.speak(u);}},[]);
      return{initAudio:init,playNote,playPop,playFirework,playTarget,playGift,playDrum,playPianoKey,playWarp,speak,getAnalyser:()=>aRef.current};
    }

    // ════════════════════════════════════════════════════════════════════════════
    // MOTION DETECTION
    // ════════════════════════════════════════════════════════════════════════════
    function useMotionDetection(reduceMotion=false){
      const[ms,setMs]=useState({intensity:0,type:null,origin:{x:0,y:0},direction:{x:0,y:0},velocity:0,isActive:false});
      const[perm,setPerm]=useState('unknown');
      const msr=useRef(ms),lm=useRef({x:0,y:0,time:performance.now()}),lt=useRef(new Map());
      const upd=useCallback((u)=>{if(reduceMotion)return;const ns={...msr.current,...u,isActive:true,intensity:Math.min(100,Math.max(0,msr.current.intensity*0.7+(u.intensity||0)*0.3))};if(ns.rt)clearTimeout(ns.rt);ns.rt=setTimeout(()=>{msr.current={...msr.current,isActive:false};setMs(msr.current);},150);msr.current=ns;setMs(ns);},[reduceMotion]);
      const reqPerm=async()=>{if(typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function'){try{const p=await DeviceMotionEvent.requestPermission();setPerm(p);return p==='granted';}catch{setPerm('denied');return false;}}else{setPerm('granted');return true;}};
      useEffect(()=>{if(reduceMotion)return;if(typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function')setPerm('prompt');else setPerm('granted');
        const mm=e=>{const n=performance.now(),dt=n-lm.current.time;if(dt<16)return;const dx=e.clientX-lm.current.x,dy=e.clientY-lm.current.y,d=Math.sqrt(dx*dx+dy*dy),v=(d/dt)*1000;upd({type:'mouse',origin:{x:e.clientX,y:e.clientY},direction:{x:dx/(d||1),y:dy/(d||1)},velocity:v,intensity:Math.min(100,v/20)});lm.current={x:e.clientX,y:e.clientY,time:n};};
        const ts=e=>{const n=performance.now();Array.from(e.changedTouches).forEach(t=>lt.current.set(t.identifier,{x:t.clientX,y:t.clientY,time:n}));};
        const tm=e=>{const n=performance.now();let mv=0,pt=null,dx=0,dy=0;Array.from(e.changedTouches).forEach(t=>{const l=lt.current.get(t.identifier);if(!l)return;const dt=n-l.time;if(dt<=0)return;const tdx=t.clientX-l.x,tdy=t.clientY-l.y,d=Math.sqrt(tdx*tdx+tdy*tdy),v=(d/dt)*1000;if(v>mv){mv=v;pt=t;dx=tdx;dy=tdy;}lt.current.set(t.identifier,{x:t.clientX,y:t.clientY,time:n});});if(pt&&mv>50){const d=Math.sqrt(dx*dx+dy*dy);upd({type:'touch',origin:{x:pt.clientX,y:pt.clientY},direction:{x:dx/(d||1),y:dy/(d||1)},velocity:mv,intensity:Math.min(100,mv/30)});}};
        const te=e=>Array.from(e.changedTouches).forEach(t=>lt.current.delete(t.identifier));
        window.addEventListener('mousemove',mm,{passive:true});window.addEventListener('touchstart',ts,{passive:true});window.addEventListener('touchmove',tm,{passive:true});window.addEventListener('touchend',te,{passive:true});
        return()=>{window.removeEventListener('mousemove',mm);window.removeEventListener('touchstart',ts);window.removeEventListener('touchmove',tm);window.removeEventListener('touchend',te);};
      },[reduceMotion,upd]);
      return[ms,reqPerm,perm];
    }

    // ════════════════════════════════════════════════════════════════════════════
    // PARTICLE SYSTEM
    // ════════════════════════════════════════════════════════════════════════════
    const ParticleSystem=forwardRef(function PS(props,ref){
      const cvr=useRef(null),pr=useRef([]);
      const{theme,reduceMotion,particleDensity,fpsCap,brightness}=useParentPanel();
      const tc=getTC(theme);
      useEffect(()=>{pr.current=Array.from({length:Math.min(8000,particleDensity*30)},()=>({active:false,x:0,y:0,vx:0,vy:0,color:'#fff',size:5,life:0,maxLife:1,type:'circle',rotation:0,vr:0}));},[particleDensity]);
      useImperativeHandle(ref,()=>({
        spawnExplosion(x,y,n=22,ct=null){if(reduceMotion)return;const p=pr.current,c=tc.particleColors,s=tc.particleShapes;let sp=0;for(let i=0;i<p.length&&sp<n;i++){const q=p[i];if(q.active)continue;const a=Math.random()*Math.PI*2,v=Math.random()*280+70;q.active=true;q.x=x;q.y=y;q.vx=Math.cos(a)*v;q.vy=Math.sin(a)*v;q.color=c[Math.floor(Math.random()*c.length)];q.size=Math.random()*14+5;q.life=q.maxLife=Math.random()*2+0.5;q.type=ct||s[Math.floor(Math.random()*s.length)];q.rotation=Math.random()*Math.PI*2;q.vr=(Math.random()-0.5)*14;sp++;}},
        spawnSpiral(x,y,color='#ff00ff'){if(reduceMotion)return;const p=pr.current;let sp=0;for(let i=0;i<p.length&&sp<80;i++){const q=p[i];if(q.active)continue;const a=(sp/80)*Math.PI*6,r=sp*3,v=sp*1.5+100;q.active=true;q.x=x;q.y=y;q.vx=Math.cos(a)*v;q.vy=Math.sin(a)*v;q.color=`hsl(${(sp/80)*360},100%,60%)`;q.size=Math.random()*8+3;q.life=q.maxLife=Math.random()*2+1;q.type='star';q.rotation=a;q.vr=3;sp++;}},
        spawnEmojiRain(){if(reduceMotion)return;const p=pr.current;const em=['🌟','⭐','✨','🎉','🎊','🎈','🎁','🐰','🦊','🍪','🦋','🦄','💫','🌈','🎆','🎀','🧸','🐠'];let s=0;for(let i=0;i<p.length&&s<70;i++){const q=p[i];if(q.active)continue;q.active=true;q.x=Math.random()*window.innerWidth;q.y=-60-Math.random()*300;q.vx=(Math.random()-0.5)*70;q.vy=Math.random()*130+60;q.color=em[Math.floor(Math.random()*em.length)];q.size=Math.random()*28+22;q.life=q.maxLife=5;q.type='emoji';q.rotation=Math.random()*Math.PI*2;q.vr=(Math.random()-0.5)*5;s++;}},
      }));
      useEffect(()=>{
        const cv=cvr.current;if(!cv)return;const ctx=cv.getContext('2d',{alpha:false});let id,lt=performance.now();const fi=1000/fpsCap;
        const resize=()=>{cv.width=window.innerWidth;cv.height=window.innerHeight;};resize();window.addEventListener('resize',resize);
        const h2r=h=>{const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);return r?`${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)}`:'10,14,39';};
        const bgR=h2r(tc.bg);
        const anim=(now)=>{id=requestAnimationFrame(anim);const dt=now-lt;if(dt<fi)return;const ds=Math.min(dt/1000,0.1);lt=now-(dt%fi);
          if(!reduceMotion&&tc.id!=='neon'){ctx.fillStyle=`rgba(${bgR},0.18)`;ctx.fillRect(0,0,cv.width,cv.height);}else{ctx.fillStyle=tc.bg;ctx.fillRect(0,0,cv.width,cv.height);}
          const pool=pr.current,grav=tc.id==='space'||tc.id==='disco'||tc.id==='winter'?10:300,fric=0.98;
          for(let i=0;i<pool.length;i++){const p=pool[i];if(!p.active)continue;p.vy+=grav*ds;p.vx*=fric;p.vy*=fric;p.x+=p.vx*ds;p.y+=p.vy*ds;p.rotation+=p.vr*ds;p.life-=ds;
            if(p.y>cv.height-p.size&&p.vy>0){p.y=cv.height-p.size;p.vy*=-0.6;p.vx*=0.8;}if(p.life<=0){p.active=false;continue;}
            ctx.globalAlpha=Math.max(0,p.life/p.maxLife);
            if(p.type==='emoji'){ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rotation);ctx.font=`${p.size}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p.color,0,0);ctx.restore();}
            else{ctx.fillStyle=p.color;ctx.shadowBlur=p.type==='star'?12:0;ctx.shadowColor=p.color;if(p.type==='circle'||p.type==='bubble'){ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();}
            else if(p.type==='star'){ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rotation);ctx.beginPath();for(let j=0;j<5;j++){ctx.lineTo(Math.cos((18+j*72)*Math.PI/180)*p.size,-Math.sin((18+j*72)*Math.PI/180)*p.size);ctx.lineTo(Math.cos((54+j*72)*Math.PI/180)*(p.size/2),-Math.sin((54+j*72)*Math.PI/180)*(p.size/2));}ctx.closePath();ctx.fill();ctx.restore();}
            else{ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rotation);ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);ctx.restore();}ctx.shadowBlur=0;}
          }ctx.globalAlpha=1;};
        id=requestAnimationFrame(anim);return()=>{window.removeEventListener('resize',resize);cancelAnimationFrame(id);};
      },[tc,reduceMotion,fpsCap]);
      return<canvas ref={cvr} style={{position:'absolute',inset:0,width:'100%',height:'100%',filter:`brightness(${brightness}%)`}}/>;
    });

    // ════════════════════════════════════════════════════════════════════════════
    // GALAXY BACKGROUND
    // ════════════════════════════════════════════════════════════════════════════
    function GalaxyBG(){
      const{theme,reduceMotion}=useParentPanel();const cvr=useRef(null);
      useEffect(()=>{
        const cv=cvr.current;if(!cv)return;const ctx=cv.getContext('2d');let id,t=0;
        const stars=Array.from({length:160},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.8+0.3,phase:Math.random()*Math.PI*2,speed:0.5+Math.random()*2}));
        const resize=()=>{cv.width=window.innerWidth;cv.height=window.innerHeight;};resize();window.addEventListener('resize',resize);
        const anim=()=>{id=requestAnimationFrame(anim);t+=0.02;ctx.clearRect(0,0,cv.width,cv.height);for(const s of stars){const a=Math.max(0,0.2+Math.sin(t*s.speed+s.phase)*0.6);ctx.globalAlpha=a;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x*cv.width,s.y*cv.height,s.r,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;};
        id=requestAnimationFrame(anim);return()=>{window.removeEventListener('resize',resize);cancelAnimationFrame(id);};
      },[]);
      if(reduceMotion||theme==='candy')return null;
      return<canvas ref={cvr} style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:2}}/>;
    }

    // ════════════════════════════════════════════════════════════════════════════
    // DISCO BALL
    // ════════════════════════════════════════════════════════════════════════════
    function DiscoBall(){
      const{theme,reduceMotion}=useParentPanel();const cvr=useRef(null);
      useEffect(()=>{
        if(theme!=='disco'||reduceMotion)return;
        const cv=cvr.current;if(!cv)return;const ctx=cv.getContext('2d');let id,t=0;
        const resize=()=>{cv.width=window.innerWidth;cv.height=window.innerHeight;};resize();window.addEventListener('resize',resize);
        const anim=()=>{id=requestAnimationFrame(anim);t+=0.018;ctx.clearRect(0,0,cv.width,cv.height);const cx=cv.width/2;
          for(let i=0;i<20;i++){const a=t+(i/20)*Math.PI*2,h=(i/20*360+t*90)%360;const grd=ctx.createLinearGradient(cx,0,cx+Math.cos(a)*cv.width*1.5,Math.sin(a)*cv.height*1.5);grd.addColorStop(0,'transparent');grd.addColorStop(0.35,`hsla(${h},100%,60%,0.1)`);grd.addColorStop(1,'transparent');ctx.fillStyle=grd;ctx.beginPath();ctx.moveTo(cx,0);ctx.arc(cx,0,cv.width*2,a-0.04,a+0.04);ctx.closePath();ctx.fill();}
          ctx.save();ctx.translate(cv.width/2,75);const bg=ctx.createRadialGradient(-12,-12,4,0,0,50);bg.addColorStop(0,'#fff');bg.addColorStop(0.4,'#ccc');bg.addColorStop(1,'#777');ctx.shadowBlur=30;ctx.shadowColor='#fff';ctx.fillStyle=bg;ctx.beginPath();ctx.arc(0,0,50,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
          for(let r=0;r<5;r++)for(let c=0;c<10;c++){const ta=c/10*Math.PI*2+t*0.5,ti=r/5*Math.PI*0.8-0.4,tx=Math.sin(ta)*Math.cos(ti)*50,ty=Math.sin(ti)*50,tz=Math.cos(ta)*Math.cos(ti);if(tz>0){ctx.fillStyle=`hsla(${(r*45+c*72+t*80)%360},100%,75%,0.9)`;ctx.beginPath();ctx.arc(tx,ty,4.5,0,Math.PI*2);ctx.fill();}}
          ctx.restore();};
        id=requestAnimationFrame(anim);return()=>{window.removeEventListener('resize',resize);cancelAnimationFrame(id);};
      },[theme,reduceMotion]);
      if(theme!=='disco'||reduceMotion)return null;
      return<canvas ref={cvr} style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:8}}/>;
    }

    // ════════════════════════════════════════════════════════════════════════════
    // ⚡ NEW: LIGHTNING CANVAS (space + neon themes)
    // ════════════════════════════════════════════════════════════════════════════
    function LightningCanvas(){
      const{lightningEnabled,theme,isLocked,reduceMotion}=useParentPanel();
      const cvr=useRef(null);
      useEffect(()=>{
        const tc=getTC(theme);
        if(!lightningEnabled||isLocked||reduceMotion||(tc.weather!=='lightning'))return;
        const cv=cvr.current;if(!cv)return;
        const ctx=cv.getContext('2d');
        let id,bolts=[],nextBolt=2000+Math.random()*3000;
        const resize=()=>{cv.width=window.innerWidth;cv.height=window.innerHeight;};resize();window.addEventListener('resize',resize);
        const mkBolt=(x,y,tx,ty,depth=0)=>{if(depth>4)return[];const pts=[{x,y}];let cx=x,cy=y;const steps=6+Math.floor(Math.random()*4);for(let i=0;i<steps;i++){const t=((i+1)/steps);const nx=x+(tx-x)*t+(Math.random()-0.5)*(cv.width*0.08*(1-depth*0.15));const ny=y+(ty-y)*t+(Math.random()-0.5)*(cv.height*0.03);pts.push({x:nx,y:ny});cx=nx;cy=ny;}pts.push({x:tx,y:ty});return pts;};
        const spawnBolt=()=>{const x=cv.width*0.1+Math.random()*cv.width*0.8;const pts=mkBolt(x,0,x+(Math.random()-0.5)*cv.width*0.2,cv.height*0.5+Math.random()*cv.height*0.3);bolts.push({pts,life:0.8,color:theme==='neon'?'#00ffff':'#ffffff',children:Math.random()>0.5?[mkBolt(pts[Math.floor(pts.length/2)].x,pts[Math.floor(pts.length/2)].y,pts[Math.floor(pts.length/2)].x+(Math.random()-0.5)*100,pts[Math.floor(pts.length/2)].y+100+Math.random()*100)]:[],});};
        let last=performance.now();
        const anim=(now)=>{id=requestAnimationFrame(anim);const dt=now-last;last=now;nextBolt-=dt;if(nextBolt<=0){spawnBolt();nextBolt=3000+Math.random()*4000;}
          ctx.clearRect(0,0,cv.width,cv.height);
          bolts=bolts.filter(b=>{b.life-=dt/400;if(b.life<=0)return false;const draw=(pts,w)=>{if(!pts||pts.length<2)return;ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);ctx.strokeStyle=b.color;ctx.lineWidth=w;ctx.globalAlpha=b.life;ctx.shadowBlur=20*b.life;ctx.shadowColor=b.color;ctx.stroke();ctx.shadowBlur=0;};draw(b.pts,2+b.life*2);b.children.forEach(c=>draw(c,1));return true;});
          ctx.globalAlpha=1;};
        id=requestAnimationFrame(anim);return()=>{window.removeEventListener('resize',resize);cancelAnimationFrame(id);};
      },[lightningEnabled,theme,isLocked,reduceMotion]);
      return<canvas ref={cvr} style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:11}}/>;
    }

    // ════════════════════════════════════════════════════════════════════════════
    // ❄️ NEW: WEATHER EFFECTS (snow, petals, bubbles, candy)
    // ════════════════════════════════════════════════════════════════════════════
    function WeatherEffects(){
      const{weatherFX,theme,isLocked,reduceMotion}=useParentPanel();
      const[particles,setParticles]=useState([]);
      const tc=getTC(theme);
      const weatherType=tc.weather;

      const WEATHER_CONFIG={
        snow:{emoji:'❄️',alt:['❄️','🌨️','⛄'],size:[20,35],speed:[40,90],drift:30,count:18},
        petals:{emoji:'🌸',alt:['🌸','🌺','🍀','🌼'],size:[18,30],speed:[30,70],drift:50,count:14},
        bubbles:{emoji:'🫧',alt:['🫧','💧','🔵'],size:[20,40],speed:[20,50],drift:20,count:12},
        candy:{emoji:'🍬',alt:['🍬','🍭','🍡','🍩','🧁'],size:[20,32],speed:[50,100],drift:40,count:16},
        confetti:{emoji:'🎊',alt:['🎊','🎉','🎈','🌟'],size:[18,28],speed:[60,110],drift:60,count:20},
        lightning:{emoji:null,alt:[],size:[0,0],speed:[0,0],drift:0,count:0},
      };

      useEffect(()=>{
        if(!weatherFX||isLocked||reduceMotion||!weatherType||weatherType==='lightning')return;

    function Multiplayer(){
      const{multiplayer,isLocked}=useParentPanel();const[s1,setS1]=useState(0),[s2,setS2]=useState(0);
      useEffect(()=>{if(!multiplayer||isLocked)return;const h=e=>{const{player,points}=e.detail;if(player===1)setS1(s=>s+points);if(player===2)setS2(s=>s+points);};window.addEventListener('bkp-score',h);return()=>window.removeEventListener('bkp-score',h);},[multiplayer,isLocked]);
      if(!multiplayer)return null;
      return<div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:20,display:'flex'}}>
        <div style={{position:'absolute',left:'50%',top:0,bottom:0,width:2,background:'rgba(255,255,255,0.2)',transform:'translateX(-50%)'}}/>
        <div style={{flex:1,padding:32}}><div style={{fontSize:'2.5rem',fontWeight:900,color:'#4ade80',textShadow:'0 0 20px #4ade80'}}>P1: {s1}</div><div style={{color:'rgba(255,255,255,0.4)',fontSize:13,marginTop:8}}>WASD / Left Side</div></div>
        <div style={{flex:1,padding:32,textAlign:'right'}}><div style={{fontSize:'2.5rem',fontWeight:900,color:'#60a5fa',textShadow:'0 0 20px #60a5fa'}}>P2: {s2}</div><div style={{color:'rgba(255,255,255,0.4)',fontSize:13,marginTop:8}}>Arrows / Right Side</div></div>
      </div>;
    }

    function AudioViz(){
      const{audioVisualizer,isLocked}=useParentPanel();const{getAnalyser}=useAudioManager();const cvr=useRef(null);
      useEffect(()=>{if(!audioVisualizer||isLocked)return;const cv=cvr.current;if(!cv)return;const ctx=cv.getContext('2d');const an=getAnalyser();if(!an)return;const buf=new Uint8Array(an.frequencyBinCount);let id;const draw=()=>{id=requestAnimationFrame(draw);cv.width=window.innerWidth;cv.height=100;an.getByteFrequencyData(buf);ctx.clearRect(0,0,cv.width,cv.height);const bw=(cv.width/buf.length)*2.5;let x=0;for(let i=0;i<buf.length;i++){const bh=buf[i]/2.5;ctx.fillStyle=`hsla(${i*2},100%,50%,0.5)`;ctx.fillRect(x,cv.height-bh,bw,bh);x+=bw+1;}};draw();return()=>cancelAnimationFrame(id);},[audioVisualizer,isLocked,getAnalyser]);
      if(!audioVisualizer)return null;
      return<canvas ref={cvr} style={{position:'fixed',bottom:0,left:0,width:'100%',height:100,pointerEvents:'none',zIndex:10,opacity:0.5,mixBlendMode:'screen'}}/>;
    }

    const SCALES={pen:[261.63,293.66,329.63,392,440,523.25],oc:[261.63,311.13,349.23,392,466.16]};
    function MusicGen(){
      const{musicEnabled,theme,isLocked}=useParentPanel();const{playNote}=useAudioManager();const ir=useRef(null),sr=useRef(0);
      useEffect(()=>{if(!musicEnabled||isLocked){if(ir.current)clearInterval(ir.current);return;}const sc=theme==='ocean'?SCALES.oc:SCALES.pen,tp=theme==='neon'||theme==='disco'?240:580;ir.current=setInterval(()=>{sr.current=(sr.current+(Math.random()>0.3?1:-1)+sc.length)%sc.length;if(Math.random()>0.2)playNote(sc[sr.current],false,Math.random());},tp);return()=>clearInterval(ir.current);},[musicEnabled,theme,isLocked,playNote]);return null;
    }

    function Surprise(){
      const{surpriseEffects,isLocked}=useParentPanel();
      useEffect(()=>{if(!surpriseEffects||isLocked)return;const id=setInterval(()=>{const e=['emoji-rain','starburst','color-wave'];window.dispatchEvent(new CustomEvent('bkp-surprise',{detail:e[Math.floor(Math.random()*e.length)]}));},10000);return()=>clearInterval(id);},[surpriseEffects,isLocked]);return null;
    }

    function VoiceR(){
      const{voiceReactions,soundEnabled}=useParentPanel();const{speak}=useAudioManager();const cr=useRef(0),tr=useRef(null);
      useEffect(()=>{if(!voiceReactions||!soundEnabled)return;const h=()=>{cr.current++;if(tr.current)clearTimeout(tr.current);if(cr.current===10)speak('Yay!');else if(cr.current===30)speak('Wow!');else if(cr.current===50)speak('Super!');else if(cr.current===100)speak('Amazing!');else if(cr.current===200)speak('Incredible!');tr.current=setTimeout(()=>{cr.current=0;},2000);};window.addEventListener('bkp-interaction',h);return()=>{window.removeEventListener('bkp-interaction',h);if(tr.current)clearTimeout(tr.current);};},[voiceReactions,soundEnabled,speak]);return null;
    }

    function IdleDemo(){
      const{isLocked}=useParentPanel();const[idle,setIdle]=useState(false);const tr=useRef(null),dr=useRef(null);
      useEffect(()=>{if(isLocked){setIdle(false);return;}const reset=()=>{setIdle(false);clearTimeout(tr.current);clearInterval(dr.current);tr.current=setTimeout(()=>setIdle(true),30000);};window.addEventListener('mousemove',reset);window.addEventListener('keydown',reset);window.addEventListener('touchstart',reset);reset();return()=>{window.removeEventListener('mousemove',reset);window.removeEventListener('keydown',reset);window.removeEventListener('touchstart',reset);clearTimeout(tr.current);clearInterval(dr.current);};},[isLocked]);
      useEffect(()=>{if(idle){dr.current=setInterval(()=>{window.dispatchEvent(new CustomEvent('bkp-demo-interaction',{detail:{x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight}}));},800);}else clearInterval(dr.current);return()=>clearInterval(dr.current);},[idle]);
      return<AnimatePresence>{idle&&<motion.div initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}} style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:30,display:'flex',alignItems:'center',justifyContent:'center'}}><div className="animate-bkp-pulse" style={{background:'rgba(0,0,0,0.45)',backdropFilter:'blur(8px)',padding:'16px 40px',borderRadius:50,color:'#fff',fontSize:'clamp(1.5rem,4vw,2.5rem)',fontWeight:900,letterSpacing:'0.1em',border:'2px solid rgba(255,255,255,0.2)'}}>✨ Tap to Play! ✨</div></motion.div>}</AnimatePresence>;
    }

    function PerfMon(){
      const{setParticleDensity,particleDensity}=useParentPanel();const fr=useRef(0),lr=useRef(performance.now()),lfr=useRef(0);
      useEffect(()=>{let id;const chk=t=>{fr.current++;if(t-lr.current>=1000){const fps=fr.current;if(fps<30){lfr.current++;if(lfr.current>3&&particleDensity>50){setParticleDensity(p=>Math.max(50,p-20));lfr.current=0;}}else lfr.current=0;fr.current=0;lr.current=t;}id=requestAnimationFrame(chk);};id=requestAnimationFrame(chk);return()=>cancelAnimationFrame(id);},[particleDensity,setParticleDensity]);return null;
    }

    // ════════════════════════════════════════════════════════════════════════════
    // PARENT CONTROL PANEL
    // ════════════════════════════════════════════════════════════════════════════
    function ParentControlPanel(){
      const p=useParentPanel();
      const{isPanelOpen,closePanel,theme,setTheme,mode,setMode,soundEnabled,toggleSound,brightness,setBrightness,reduceMotion,toggleReduceMotion,sessionTime,setSessionTime,timeRemaining,lockScreen,particleDensity,setParticleDensity,musicEnabled,toggleMusic,multiplayer,toggleMultiplayer,surpriseEffects,toggleSurpriseEffects,voiceReactions,toggleVoiceReactions,fpsCap,setFpsCap,audioVisualizer,toggleAudioVisualizer,starsEnabled,toggleStars,motionEffectsEnabled,toggleMotionEffects,rainbowTrail,toggleRainbowTrail,fireworksEnabled,toggleFireworks,comboEnabled,toggleCombo,targetGame,toggleTargetGame,balloons,toggleBalloons,ripple,toggleRipple,giftBoxes,toggleGiftBoxes,weatherFX,toggleWeatherFX,flyingCreatures,toggleFlyingCreatures,achievements,toggleAchievements,reactionWords,toggleReactionWords,pianoKeys,togglePianoKeys,lightningEnabled,toggleLightning,warpMode,toggleWarpMode,confettiCannon,toggleConfettiCannon}=p;
      const tr=useRef(null);const rt=()=>{if(tr.current)clearTimeout(tr.current);tr.current=setTimeout(closePanel,60000);};
      useEffect(()=>{if(isPanelOpen)rt();return()=>clearTimeout(tr.current);},[isPanelOpen]);
      if(!isPanelOpen)return null;
      const fmt=s=>`${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
      const T=({label,checked,onChange,disabled=false})=>(
        <button onClick={onChange} disabled={disabled} className={`w-full flex items-center justify-between p-2.5 rounded-xl border transition-colors text-sm ${disabled?'bg-zinc-900/40 border-zinc-800/40 opacity-40 cursor-not-allowed':'bg-zinc-900 border-zinc-800 hover:border-zinc-600 cursor-pointer'}`}>
          <span>{label}</span>
          <div className={`w-10 h-5 rounded-full transition-all relative shrink-0 ${checked&&!disabled?'bg-green-500':'bg-zinc-700'}`}><div className={`absolute top-0.5 w-4 h-4 rounded-full bg-white transition-all shadow-sm ${checked&&!disabled?'left-5':'left-0.5'}`}/></div>
        </button>
      );
      return(
        <AnimatePresence>
          <motion.div initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}} className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-md p-3" onClick={closePanel} onMouseMove={rt} onTouchStart={rt}>
            <motion.div initial={{scale:0.93,y:24}} animate={{scale:1,y:0}} exit={{scale:0.93,y:24}} onClick={e=>e.stopPropagation()} className="bg-zinc-950 border border-zinc-800 rounded-2xl shadow-2xl w-full max-w-4xl overflow-hidden text-zinc-100 flex flex-col max-h-[92vh]">
              <div className="flex items-center justify-between p-5 border-b border-zinc-800 shrink-0">
                <div className="flex items-center gap-3"><Settings className="w-6 h-6 text-zinc-400"/><h2 className="text-xl font-bold">⚙️ Parent Controls</h2></div>
                <button onClick={closePanel} className="p-2 rounded-full hover:bg-zinc-800 transition-colors"><X className="w-5 h-5"/></button>
              </div>
              <div className="p-5 overflow-y-auto space-y-6">
                {/* Theme & Mode */}
                <section>
                  <h3 className="text-xs font-bold text-zinc-400 uppercase tracking-wider mb-3">🎨 Theme & Mode</h3>
                  <div className="grid grid-cols-2 gap-4">
                    <div className="space-y-1.5">{Object.values(THEMES).map(t=><button key={t.id} onClick={()=>setTheme(t.id)} className={`w-full px-3 py-2 rounded-xl border text-left text-sm font-medium transition-all ${theme===t.id?'bg-white text-black border-white':'bg-zinc-900 border-zinc-800 hover:border-zinc-600'}`}>{t.name}</button>)}</div>
                    <div className="space-y-1.5">{Object.values(MODES).map(m=><button key={m.id} onClick={()=>setMode(m.id)} className={`w-full p-2.5 rounded-xl border text-left transition-all ${mode===m.id?'bg-white text-black border-white':'bg-zinc-900 border-zinc-800 hover:border-zinc-600'}`}><div className="font-medium text-sm">{m.name}</div><div className={`text-xs mt-0.5 ${mode===m.id?'text-zinc-600':'text-zinc-500'}`}>{m.description}</div></button>)}</div>
                  </div>
                </section>

                <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                  {/* Gameplay */}
                  <section className="space-y-1.5">
                    <h3 className="text-xs font-bold text-zinc-400 uppercase tracking-wider mb-2">🎮 Gameplay</h3>
                    <T label="👥 Multiplayer" checked={multiplayer} onChange={toggleMultiplayer}/>
                    <T label="🎯 Target Game" checked={targetGame} onChange={toggleTargetGame}/>
                    <T label="🔥 Combo Meter" checked={comboEnabled} onChange={toggleCombo}/>
                    <T label="🎁 Gift Boxes" checked={giftBoxes} onChange={toggleGiftBoxes}/>
                    <T label="🏅 Achievements" checked={achievements} onChange={toggleAchievements}/>
                    <T label="🌀 Warp Burst" checked={warpMode} onChange={toggleWarpMode}/>
                    <T label="✨ Surprises" checked={surpriseEffects} onChange={toggleSurpriseEffects}/>
                    <T label="📊 Audio Viz" checked={audioVisualizer} onChange={toggleAudioVisualizer}/>
                  </section>
                  {/* Sound */}
                  <section className="space-y-1.5">
                    <h3 className="text-xs font-bold text-zinc-400 uppercase tracking-wider mb-2">🎵 Sound</h3>
                    <T label="🔊 Sound FX" checked={soundEnabled} onChange={toggleSound}/>
                    <T label="🎵 Background Music" checked={musicEnabled} onChange={toggleMusic}/>
                    <T label="🎤 Voice Reactions" checked={voiceReactions} onChange={toggleVoiceReactions}/>
                    <T label="🎹 Piano Keys" checked={pianoKeys} onChange={togglePianoKeys}/>
                  </section>
                  {/* Characters */}
                  <section className="space-y-1.5">
                    <h3 className="text-xs font-bold text-zinc-400 uppercase tracking-wider mb-2">🐾 Characters</h3>
                    <T label="🐉 Flying Creatures" checked={flyingCreatures} onChange={toggleFlyingCreatures} disabled={reduceMotion}/>
                    <T label="🎈 Balloon Trail" checked={balloons} onChange={toggleBalloons} disabled={reduceMotion}/>
                    <T label="💬 Reaction Words" checked={reactionWords} onChange={toggleReactionWords}/>
                    <T label="❄️ Weather FX" checked={weatherFX} onChange={toggleWeatherFX} disabled={reduceMotion}/>
                  </section>
                  {/* Visual FX */}
                  <section className="space-y-1.5">
                    <h3 className="text-xs font-bold text-zinc-400 uppercase tracking-wider mb-2">✨ Visual FX</h3>
                    <T label="🌈 Rainbow Trail" checked={rainbowTrail} onChange={toggleRainbowTrail} disabled={reduceMotion}/>
                    <T label="🎆 Fireworks" checked={fireworksEnabled} onChange={toggleFireworks} disabled={reduceMotion}/>
                    <T label="⭐ Falling Stars" checked={starsEnabled} onChange={toggleStars} disabled={reduceMotion}/>
                    <T label="⚡ Lightning" checked={lightningEnabled} onChange={toggleLightning} disabled={reduceMotion}/>
                    <T label="🎊 Confetti Cannon" checked={confettiCannon} onChange={toggleConfettiCannon} disabled={reduceMotion}/>
                    <T label="💧 Ripple Rings" checked={ripple} onChange={toggleRipple}/>
                    <T label="⚡ Motion FX" checked={motionEffectsEnabled} onChange={toggleMotionEffects} disabled={reduceMotion}/>
                    <T label="🧘 Reduce Motion" checked={reduceMotion} onChange={toggleReduceMotion}/>
                  </section>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                  <section className="space-y-3">
                    <h3 className="text-xs font-bold text-zinc-400 uppercase tracking-wider">⚙️ Performance</h3>
                    {[{l:'☀️ Brightness',min:50,max:150,val:brightness,set:setBrightness,suf:'%'},{l:'✨ Particle Density',min:10,max:200,step:10,val:particleDensity,set:setParticleDensity,suf:'%'}].map(s=>(
                      <div key={s.l} className="p-3 rounded-xl bg-zinc-900 border border-zinc-800">
                        <div className="flex justify-between mb-2"><span className="text-sm">{s.l}</span><span className="text-xs text-zinc-400">{s.val}{s.suf}</span></div>
                        <input type="range" min={s.min} max={s.max} step={s.step||1} value={s.val} onChange={e=>s.set(e.target.value)} className="w-full accent-white"/>
                      </div>
                    ))}
                    <div className="p-3 rounded-xl bg-zinc-900 border border-zinc-800">
                      <div className="flex items-center gap-2 mb-2"><MonitorPlay className="w-4 h-4"/><span className="text-sm">FPS Cap</span></div>
                      <div className="flex gap-2">{[30,60,120].map(f=><button key={f} onClick={()=>setFpsCap(f)} className={`flex-1 py-1.5 rounded-lg text-xs font-medium transition-colors ${fpsCap===f?'bg-white text-black':'bg-zinc-800 hover:bg-zinc-700'}`}>{f} FPS</button>)}</div>
                    </div>
                  </section>
                  <section>
                    <h3 className="text-xs font-bold text-zinc-400 uppercase tracking-wider mb-3">⏱️ Session Timer</h3>
                    <div className="p-3 rounded-xl bg-zinc-900 border border-zinc-800">
                      <div className="flex items-center justify-between mb-3"><div className="flex items-center gap-2"><Clock className="w-4 h-4"/><span className="text-sm">Auto-Lock After</span></div>{timeRemaining>0&&<span className="text-xs font-mono text-green-400">{fmt(timeRemaining)}</span>}</div>
                      <div className="grid grid-cols-5 gap-1">{[0,5,15,30,60].map(m=><button key={m} onClick={()=>setSessionTime(m)} className={`py-2 rounded-lg text-xs font-bold transition-colors ${sessionTime===m?'bg-white text-black':'bg-zinc-800 hover:bg-zinc-700'}`}>{m===0?'Off':`${m}m`}</button>)}</div>
                    </div>
                    <div className="mt-3 p-3 rounded-xl bg-zinc-900 border border-zinc-800 text-xs text-zinc-500 leading-relaxed">
                      <div className="font-semibold text-zinc-400 mb-1">💡 How to access:</div>
                      Hold the <strong className="text-zinc-300">top-left corner</strong> for 2 seconds to open/close controls or unlock.
                    </div>
                  </section>
                </div>
              </div>
              <div className="p-4 border-t border-zinc-800 bg-zinc-900/50 flex justify-between items-center shrink-0">
                <button onClick={()=>{lockScreen();closePanel();}} className="flex items-center gap-2 px-5 py-2.5 rounded-xl bg-red-500/10 text-red-400 hover:bg-red-500/20 transition-colors font-medium text-sm"><Lock className="w-4 h-4"/> Lock Screen</button>
                <button onClick={closePanel} className="px-8 py-2.5 rounded-xl bg-white text-black font-bold hover:bg-zinc-200 transition-colors text-sm">Done ✓</button>
              </div>
            </motion.div>
          </motion.div>
        </AnimatePresence>
      );
    }

    function ParentUnlock(){
      const{openPanel,isPanelOpen,isLocked,unlockScreen}=useParentPanel();const[prog,setP]=useState(0);const ir=useRef(null);
      if(isPanelOpen)return null;
      const start=e=>{e.preventDefault();let c=0;ir.current=setInterval(()=>{c+=5;setP(c);if(c>=100){clearInterval(ir.current);setP(0);isLocked?unlockScreen():openPanel();}},100);};
      const end=()=>{if(ir.current)clearInterval(ir.current);setP(0);};
      return<div style={{position:'fixed',top:0,left:0,width:64,height:64,zIndex:50,display:'flex',alignItems:'flex-start',justifyContent:'flex-start',padding:8,cursor:'pointer',touchAction:'none'}} onMouseDown={start} onMouseUp={end} onMouseLeave={end} onTouchStart={start} onTouchEnd={end}>
        {prog>0&&<div style={{width:32,height:32,borderRadius:'50%',border:'4px solid rgba(255,255,255,0.2)',position:'relative',overflow:'hidden'}}><div style={{position:'absolute',bottom:0,left:0,width:'100%',background:'rgba(255,255,255,0.8)',transition:'height 0.1s',height:`${prog}%`}}/></div>}
      </div>;
    }

    function LockScreen(){
      const{isLocked}=useParentPanel();
      return<AnimatePresence>{isLocked&&<motion.div initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}} style={{position:'fixed',inset:0,zIndex:40,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,0.8)',backdropFilter:'blur(8px)',color:'#fff'}}><Lock className="w-24 h-24" style={{marginBottom:24,opacity:0.5}}/><h1 style={{fontSize:'clamp(2.5rem,8vw,4rem)',fontWeight:900,marginBottom:16}}>Locked 🔒</h1><p style={{fontSize:'clamp(1rem,3vw,1.5rem)',opacity:0.6,textAlign:'center',padding:'0 24px'}}>Hold the top-left corner for 2 seconds to unlock</p></motion.div>}</AnimatePresence>;
    }

    // ════════════════════════════════════════════════════════════════════════════
    // MAIN COMPONENT
    // ════════════════════════════════════════════════════════════════════════════
    function BabyKeyPlay(){
      const pRef=useRef(null);
      const{isLocked,soundEnabled,multiplayer,theme,reduceMotion,starsEnabled,motionEffectsEnabled,mode}=useParentPanel();
      const{playPop,playNote,initAudio}=useAudioManager();
      const[ms,reqPerm,perm]=useMotionDetection(reduceMotion);

      useEffect(()=>{
        const act=(x,y,player=1)=>{
          if(isLocked)return;
          if(soundEnabled)initAudio();
          window.dispatchEvent(new CustomEvent('bkp-interaction'));
          window.dispatchEvent(new CustomEvent('bkp-tap',{detail:{x,y}}));
          if(multiplayer)window.dispatchEvent(new CustomEvent('bkp-score',{detail:{player,points:10}}));
          pRef.current?.spawnExplosion(x,y,22);
          if(soundEnabled)playPop(x/window.innerWidth);
        };
        const onK=e=>{if(e.repeat||isLocked)return;const w=window.innerWidth,h=window.innerHeight;if(multiplayer){if(['w','a','s','d'].includes(e.key.toLowerCase())){act(w*0.25,h*0.5,1);if(soundEnabled)playNote(e.key,false,0.25);}else if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)){act(w*0.75,h*0.5,2);if(soundEnabled)playNote(e.key,false,0.75);}}else{const x=Math.random()*w*0.8+w*0.1,y=Math.random()*h*0.8+h*0.1;act(x,y,1);if(soundEnabled)playNote(e.key,false,x/w);}};
        const onP=e=>{if(isLocked||mode==='drawing')return;act(e.clientX,e.clientY,multiplayer?(e.clientX<window.innerWidth/2?1:2):1);};
        const onDemo=e=>act(e.detail.x,e.detail.y,1);
        const onS=e=>{if(e.detail==='emoji-rain')pRef.current?.spawnEmojiRain();else pRef.current?.spawnExplosion(window.innerWidth/2,window.innerHeight/2,130,'star');};
        const onSP=e=>{const{x,y,count,type}=e.detail;pRef.current?.spawnExplosion(x,y,count,type);};
        const onWarp=e=>{pRef.current?.spawnSpiral(e.detail.x,e.detail.y);};
        window.addEventListener('keydown',onK);window.addEventListener('pointerdown',onP);window.addEventListener('bkp-demo-interaction',onDemo);window.addEventListener('bkp-surprise',onS);window.addEventListener('bkp-spawn-particles',onSP);window.addEventListener('bkp-warp-burst',onWarp);
        return()=>{window.removeEventListener('keydown',onK);window.removeEventListener('pointerdown',onP);window.removeEventListener('bkp-demo-interaction',onDemo);window.removeEventListener('bkp-surprise',onS);window.removeEventListener('bkp-spawn-particles',onSP);window.removeEventListener('bkp-warp-burst',onWarp);};
      },[isLocked,soundEnabled,multiplayer,initAudio,playPop,playNote,mode]);

      return(
        <div style={{position:'relative',width:'100%',height:'100%',overflow:'hidden',background:getTC(theme).bg}}>
          {/* Background layers */}
          <GalaxyBG/>
          <DiscoBall/>
          {/* Main canvas */}
          <ParticleSystem ref={pRef}/>
          {/* Overlay effects */}
          <FallingStars theme={theme} isEnabled={starsEnabled&&!reduceMotion}/>
          <RainbowWave/>
          <RippleRings/>
          <RainbowTrail/>
          <FireworksSystem/>
          <LightningCanvas/>
          <WeatherEffects/>
          {/* Motion */}
          <MotionFX ms={ms} isEnabled={motionEffectsEnabled&&!reduceMotion}/>
          <MouseTracker ms={ms} isEnabled={motionEffectsEnabled&&!reduceMotion}/>
          <TouchSwipe ms={ms} isEnabled={motionEffectsEnabled&&!reduceMotion}/>
          <DevMH ms={ms} reqPerm={reqPerm} perm={perm} isEnabled={motionEffectsEnabled&&!reduceMotion}/>
          {/* Characters */}
          <BouncingAnimals/>
          <FlyingCreatures/>
          <GiftBoxes/>
          <BalloonTrail/>
          {/* Particle effects */}
          <ColorSplash/>
          <ConfettiCannon/>
          {/* Drawing */}
          <DrawingMode/>
          {/* Piano (music mode) */}
          <PianoKeyboard/>
          {/* Game HUD */}
          <Multiplayer/>
          <AudioViz/>
          <TargetGame/>
          <ComboSystem/>
          <WarpBurst/>
          {/* Feedback */}
          <KeyLetterPop/>
          <ReactionWords/>
          <AchievementBadges/>
          <ScoreDisplay/>
          {/* Background systems */}
          <MusicGen/>
          <Surprise/>
          <VoiceR/>
          <IdleDemo/>
          <PerfMon/>
        </div>
      );
    }

    function App(){
      return<ParentPanelProvider><BabyKeyPlay/><ParentUnlock/><ParentControlPanel/><LockScreen/></ParentPanelProvider>;
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
